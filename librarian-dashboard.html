<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Librarian Control - GB Library</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="global.css">
    <script src="data.js" defer></script>
    <script src="main.js" defer></script>
</head>
<body>
    <div id="navbar-container"></div>
    
    <main>
        <h1 class="page-title">📋 Librarian Dashboard</h1>
        
        <div class="stats-grid">
            <div class="stat-card">
                <i class="fas fa-book"></i>
                <p class="stat-value" id="lib-total-books">0</p>
                <p class="stat-label">Total Books</p>
            </div>
            <div class="stat-card">
                <i class="fas fa-hand-holding-heart"></i>
                <p class="stat-value" id="lib-active-loans">0</p>
                <p class="stat-label">Active Loans</p>
            </div>
          <div class="stat-card">
                <i class="fas fa-hourglass-half"></i>
                <p class="stat-value" id="lib-overdue">0</p>
                <p class="stat-label">Overdue Items</p>
            </div>  
            <div class="stat-card">
                <i class="fas fa-users"></i>
                <p class="stat-value">1,284</p>
                <p class="stat-label">Registered Members</p>
            </div>
        </div>
        
        <div class="add-book-section">
            <h2>➕ Add New Book</h2>
            <form id="addBookForm" class="add-book-form">
                <input type="text" id="bookTitle" placeholder="Title" required>
                <input type="text" id="bookAuthor" placeholder="Author" required>
                <select id="bookCategory">
                    <option>Academic</option><option>Fiction</option><option>History</option><option>Bangla</option><option>Science</option>
                </select>
                <input type="number" id="bookCopies" placeholder="Total Copies" value="1" required>
                <input type="text" id="bookIsbn" placeholder="ISBN">
                <input type="text" id="bookLocation" placeholder="Location">
                <button type="submit" class="submit-btn">➕ Add Book</button>
            </form>
        </div>
         
        <div class="manage-books-section">
            <h2>📚 All Books (Manage)</h2>
            <div id="manage-books-list" class="books-manage-list"></div>
        </div>
    </main>

    <footer>
        <p>© Gono Bishwabidyalay Central Library</p>
    </footer>

    <script>
        function renderLibrarianDash() {
            const user = getCurrentUser();
            if(!user || user.role !== 'librarian') { 
                window.location.href = 'login.html'; 
                return; 
            }
            
            const books = getBooks();
            const borrowings = getBorrowings().filter(b => !b.returned);
            const overdue = borrowings.filter(b => new Date(b.dueDate) < new Date());
