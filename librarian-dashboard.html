<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Librarian Control - GB Library</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="global.css">
    <script src="data.js" defer></script>
    <script src="main.js" defer></script>
</head>
<body>
    <div id="navbar-container"></div>
    
    <main>
        <h1 class="page-title">📋 Librarian Dashboard</h1>
        
        <div class="stats-grid">
            <div class="stat-card">
                <i class="fas fa-book"></i>
                <p class="stat-value" id="lib-total-books">0</p>
                <p class="stat-label">Total Books</p>
            </div>
            <div class="stat-card">
                <i class="fas fa-hand-holding-heart"></i>
                <p class="stat-value" id="lib-active-loans">0</p>
                <p class="stat-label">Active Loans</p>
            </div>
          <div class="stat-card">
                <i class="fas fa-hourglass-half"></i>
                <p class="stat-value" id="lib-overdue">0</p>
                <p class="stat-label">Overdue Items</p>
            </div>  
            <div class="stat-card">
                <i class="fas fa-users"></i>
                <p class="stat-value">1,284</p>
                <p class="stat-label">Registered Members</p>
            </div>
