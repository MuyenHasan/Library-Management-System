<!-- login.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - GB Central Library</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="global.css">
    <script src="data.js" defer></script>
    <script src="main.js" defer></script>
</head>
<body class="login-body">
    <div class="login-container">
        <div class="login-box">
            <i class="fas fa-university login-icon"></i>
            <h1>Gono Bishwabidyalay Library</h1>
            <p>Select your role to continue</p>
            <div class="login-buttons">
                <button id="student-login" class="login-btn student-btn">
                    <i class="fas fa-user-graduate"></i> Login as Student (ID: 2024-001)
                </button>
                <button id="librarian-login" class="login-btn librarian-btn">
                    <i class="fas fa-chalkboard-user"></i> Login as Librarian (Mr. Rahim)
                </button>
            </div>
            <p class="demo-note">Demo project for Central Library</p>
        </div>
    </div>
    
    <script>
        document.getElementById('student-login')?.addEventListener('click', () => {
            setCurrentUser({role: 'student', studentId: '2024-001', name: 'Nafisa Rahman'});
            window.location.href = 'index.html';
        });
        document.getElementById('librarian-login')?.addEventListener('click', () => {
            setCurrentUser({role: 'librarian', name: 'Mr. Rahim'});
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
