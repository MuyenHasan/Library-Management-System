<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse Books - GB Library</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="global.css">
    <script src="data.js" defer></script>
    <script src="main.js" defer></script>
</head>
<body>
    <div id="navbar-container"></div>
    
    <main>
        <div class="browse-layout">
            <!-- Sidebar Filters -->
            <aside class="filters-sidebar">
                <h3><i class="fas fa-filter"></i> Filters</h3>
                <div class="filter-group">
                    <label>Category</label>
                    <select id="filter-category">
                        <option value="all">All Categories</option>
                        <option value="Academic">Academic</option>
                        <option value="Fiction">Fiction</option>
                        <option value="History">History</option>
                        <option value="Bangla">Bangla Literature</option>
                        <option value="Science">Science & Tech</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>Availability</label>
                    <select id="filter-availability">
                        <option value="all">All</option>
                        <option value="available">Available</option>
                        <option value="borrowed">Borrowed (0 copies)</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>Search</label>
                    <input type="text" id="filter-search" placeholder="Title / Author">
                </div>
                <button id="reset-filters" class="reset-btn">Reset Filters</button>
            </aside>
            
            <!-- Books Grid -->
            <div class="books-content">
                <div id="books-grid" class="books-grid"></div>
                <div id="pagination-controls" class="pagination"></div>
            </div>
        </div>
    </main>

    <footer>
        <p>© 2025 Gono Bishwabidyalay Central Library</p>
    </footer>

       <script>
        let currentPage = 1;
        const itemsPerPage = 6;
        
        function renderBrowseBooks() {
            let books = getBooks();
            const category = document.getElementById('filter-category')?.value;
            const availability = document.getElementById('filter-availability')?.value;
            const searchTerm = document.getElementById('filter-search')?.value.toLowerCase();
            
            if (category && category !== 'all') books = books.filter(b => b.category === category);
            if (availability === 'available') books = books.filter(b => b.availableCopies > 0);
            if (availability === 'borrowed') books = books.filter(b => b.availableCopies === 0);
            if (searchTerm) books = books.filter(b => b.title.toLowerCase().includes(searchTerm) || b.author.toLowerCase().includes(searchTerm));
            
            const totalPages = Math.ceil(books.length / itemsPerPage);
            const start = (currentPage-1) * itemsPerPage;
            const paginated = books.slice(start, start+itemsPerPage);
            const container = document.getElementById('books-grid');
            if (!container) return;
            
            if(paginated.length === 0) { 
                container.innerHTML = '<div class="no-results">No books found.</div>'; 
                return; 
            }
            
            container.innerHTML = paginated.map(book => `
                <div class="book-card">
                    <div class="book-cover"><i class="fas fa-book-open"></i></div>
                    <h3>${escapeHtml(book.title)}</h3>
                    <p class="author">${escapeHtml(book.author)}</p>
                    <p class="category">${book.category}</p>
                    <div class="book-footer">
                        <span class="status ${book.availableCopies > 0 ? 'available' : 'unavailable'}">${book.availableCopies > 0 ? `${book.availableCopies} copies` : 'Unavailable'}</span>
                        <a href="book-detail.html?id=${book.id}" class="details-btn">Details →</a>
                    </div>
                </div>
            `).join('');
            
            // Pagination
            const pagDiv = document.getElementById('pagination-controls');
            if(pagDiv && totalPages > 1) {
                let btns = '';
                for(let i = 1; i <= totalPages; i++) {
                    btns += `<button class="page-btn ${i === currentPage ? 'active' : ''}" data-page="${i}">${i}</button>`;
                }
                pagDiv.innerHTML = btns;
                document.querySelectorAll('.page-btn').forEach(btn => btn.addEventListener('click', (e) => {
                    currentPage = parseInt(e.target.dataset.page);
                    renderBrowseBooks();
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                }));
            } else if(pagDiv) {
                pagDiv.innerHTML = '';
            }
        }
