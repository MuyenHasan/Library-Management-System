<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard - GB Library</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="global.css">
    <script src="data.js" defer></script>
    <script src="main.js" defer></script>
</head>
<body>
    <div id="navbar-container"></div>
    
    <main>
        <div class="dashboard-header">
            <h1><i class="fas fa-user-graduate"></i> My Dashboard</h1>
        </div>
        
        <div id="student-info" class="student-info-card"></div>
        
        <div class="dashboard-section">
            <h2>📖 Currently Borrowed</h2>
            <div id="borrowed-table" class="table-wrapper"></div>
        </div>
        
        <div class="dashboard-section">
            <h2>📜 Borrowing History</h2>
            <div id="history-table" class="table-wrapper"></div>
        </div>
    </main>

    <footer>
        <p>© GB Central Library</p>
    </footer>

    <script>
        function renderStudentDashboard() {
            const user = getCurrentUser();
            if(!user || user.role !== 'student') { 
                window.location.href = 'login.html'; 
                return; 
            }
            
            const studentId = user.studentId;
            const totalFine = getStudentTotalFine(studentId);
            
            document.getElementById('student-info').innerHTML = `
                <div>
                    <strong>${escapeHtml(user.name)}</strong> (ID: ${studentId})
                    <div class="fine-amount">Total Outstanding Fine: ₹${totalFine}</div>
                </div>
            `;
            
            const borrowings = getBorrowings().filter(b => b.studentId === studentId && !b.returned);
            const history = getBorrowings().filter(b => b.studentId === studentId && b.returned);
            const books = getBooks();
            
            if(borrowings.length === 0) {
                document.getElementById('borrowed-table').innerHTML = '<div class="empty-state">No active borrowings.</div>';
            } else {
                let borrowedHtml = '<table class="data-table"><thead><tr><th>Title</th><th>Borrowed</th><th>Due Date</th><th>Fine</th><th>Actions</th></tr></thead><tbody>';
                borrowings.forEach(b => {
                    const book = books.find(bk => bk.id === b.bookId);
                    const fine = calculateFineForBorrowing(b);
                    borrowedHtml += `<tr>
                        <td>${book?.title || '?'}</td>
                        <td>${b.borrowDate}</td>
                        <td class="${fine > 0 ? 'overdue' : ''}">${b.dueDate}</td>
                        <td class="fine-cell">₹${fine}</td>
                        <td class="action-cell">
                            <button class="return-btn" data-borrow-id="${b.id}">Return</button>
                            <button class="renew-btn" data-borrow-id="${b.id}">Renew +7d</button>
                        </td>
                    </tr>`;
                });
                borrowedHtml += '</tbody></table>';
                document.getElementById('borrowed-table').innerHTML = borrowedHtml;
            }
