<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard - GB Library</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="global.css">
    <script src="data.js" defer></script>
    <script src="main.js" defer></script>
</head>
<body>
    <div id="navbar-container"></div>
    
    <main>
        <div class="dashboard-header">
            <h1><i class="fas fa-user-graduate"></i> My Dashboard</h1>
        </div>
        
        <div id="student-info" class="student-info-card"></div>
        
        <div class="dashboard-section">
            <h2>📖 Currently Borrowed</h2>
            <div id="borrowed-table" class="table-wrapper"></div>
        </div>
        
        <div class="dashboard-section">
            <h2>📜 Borrowing History</h2>
            <div id="history-table" class="table-wrapper"></div>
        </div>
    </main>

    <footer>
        <p>© GB Central Library</p>
    </footer>
