<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Details - GB Library</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="global.css">
    <script src="data.js" defer></script>
    <script src="main.js" defer></script>
</head>
<body>
    <div id="navbar-container"></div>
    
    <main>
        <div id="book-detail-container" class="book-detail-wrapper"></div>
    </main>

    <footer>
        <p>© 2025 Central Library</p>
    </footer>

    <script>
        function loadBookDetail() {
            const params = new URLSearchParams(window.location.search);
            const bookId = params.get('id');
            if (!bookId) { 
                document.getElementById('book-detail-container').innerHTML = '<div class="error-msg">Invalid book ID.</div>'; 
                return; 
            }
            
            const book = getBookById(bookId);
            if(!book) { 
                document.getElementById('book-detail-container').innerHTML = '<div class="error-msg">Book not found.</div>'; 
                return; 
            }
            
            const currentUser = getCurrentUser();
            const isStudent = currentUser && currentUser.role === 'student';
            const canBorrow = isStudent && book.availableCopies > 0 && getStudentTotalFine(currentUser.studentId) <= 50;
            
             document.getElementById('book-detail-container').innerHTML = `
                <div class="book-detail-card">
                    <div class="book-detail-cover">
                        <i class="fas fa-book"></i>
                    </div>
                    <div class="book-detail-info">
                        <h1>${escapeHtml(book.title)}</h1>
                        <p class="detail-author">by ${escapeHtml(book.author)}</p>
                        <div class="detail-meta">
                            <span><i class="fas fa-barcode"></i> ISBN: ${book.isbn}</span>
                            <span><i class="fas fa-layer-group"></i> Category: ${book.category}</span>
                            <span><i class="fas fa-map-marker-alt"></i> Location: ${book.location}</span>
                            <span><i class="fas fa-copy"></i> Total: ${book.totalCopies} | Available: ${book.availableCopies}</span>
                        </div>
                        <div class="detail-actions">
                            ${canBorrow ? `<button id="borrow-btn" class="borrow-btn"><i class="fas fa-hand-holding-heart"></i> Borrow this Book</button>` : 
                              (isStudent && book.availableCopies === 0 ? `<button class="borrow-btn disabled" disabled>Not Available</button>` : 
                              (isStudent && getStudentTotalFine(currentUser?.studentId) > 50 ? `<p class="fine-warning"><i class="fas fa-exclamation-triangle"></i> Cannot borrow: outstanding fine > ₹50</p>` : 
                              `<button class="borrow-btn disabled" disabled>Login as student to borrow</button>`))}
                            <a href="browse.html" class="back-link">← Back to browse</a>
                        </div>
                    </div>
                </div>
