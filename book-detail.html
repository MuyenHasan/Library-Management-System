<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Details - GB Library</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="global.css">
    <script src="data.js" defer></script>
    <script src="main.js" defer></script>
</head>
<body>
    <div id="navbar-container"></div>
    
    <main>
        <div id="book-detail-container" class="book-detail-wrapper"></div>
    </main>

    <footer>
        <p>© 2025 Central Library</p>
    </footer>

    <script>
        function loadBookDetail() {
            const container = document.getElementById('book-detail-container');
            const params = new URLSearchParams(window.location.search);
            const bookId = params.get('id');

            if (!bookId) {
                container.innerHTML = '<div class="error-msg">Invalid book ID.</div>';
                return;
            }

            const book = getBookById(bookId);
            if (!book) {
                container.innerHTML = '<div class="error-msg">Book not found.</div>';
                return;
            }

            const currentUser = getCurrentUser();
            const isStudent = currentUser && currentUser.role === 'student';
            let borrowSection = '';

            if (isStudent) {
                const fine = getStudentTotalFine(currentUser.studentId);
                if (fine > 50) {
                    borrowSection = `<p class="fine-warning"><i class="fas fa-exclamation-triangle"></i> Cannot borrow: outstanding fine &gt; ₹50</p>`;
                } else if (book.availableCopies > 0) {
                    borrowSection = `<button id="borrow-btn" class="borrow-btn"><i class="fas fa-hand-holding-heart"></i> Borrow this Book</button>`;
                } else {
                    borrowSection = `<button class="borrow-btn disabled" disabled>Not Available</button>`;
                }
            } else {
                borrowSection = `<button class="borrow-btn disabled" disabled>Login as student to borrow</button>`;
            }

            container.innerHTML = `
                <div class="book-detail-card">
                    <div class="book-detail-cover">
                        <i class="fas fa-book"></i>
                    </div>
                    <div class="book-detail-info">
                        <h1>${escapeHtml(book.title)}</h1>
                        <p class="detail-author">by ${escapeHtml(book.author)}</p>
                        <div class="detail-meta">
                            <span><i class="fas fa-barcode"></i> ISBN: ${book.isbn}</span>
                            <span><i class="fas fa-layer-group"></i> Category: ${book.category}</span>
                            <span><i class="fas fa-map-marker-alt"></i> Location: ${book.location}</span>
                            <span><i class="fas fa-copy"></i> Total: ${book.totalCopies} | Available: ${book.availableCopies}</span>
                        </div>
                        <div class="detail-actions">
                            ${borrowSection}
                            <a href="browse.html" class="back-link">← Back to browse</a>
                        </div>
                    </div>
                </div>
            `;

            // Attach borrow event if allowed
            if (isStudent && getStudentTotalFine(currentUser.studentId) <= 50 && book.availableCopies > 0) {
                document.getElementById('borrow-btn')?.addEventListener('click', () => {
                    const success = borrowBook(book.id, currentUser.studentId);
                    if (success) {
                        alert(`You borrowed \"${book.title}\". Due date: +14 days.`);
                        window.location.href = 'student-dashboard.html';
                    } else {
                        alert('Borrow failed. Possibly no copies left.');
                        window.location.reload();
                    }
                });
            }
        }

        window.addEventListener('DOMContentLoaded', loadBookDetail);
    </script>
</body>
</html>
